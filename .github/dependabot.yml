version: 2
updates:
  # Configuration for NuGet
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: HtmlAgilityPack
        versions:
          - 1.11.29

  # Configuration for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
